spring.application.name=app_pds
server.port=${PORT:8080}

# Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Database
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.database=postgresql
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.placeholders.schemaName=public

# Logging
logging.level.org.flywaydb=WARN

# File upload
spring.servlet.multipart.max-file-size=50MB

# Logging
# logging.level.org.hibernate.SQL=DEBUG
logging.level.software.amazon.awssdk=WARN

# Jwt
jwt.secret.key=${JWT_SECRET_KEY}
jwt.expiration.time=300000
jwt.refresh.token.expiration.time=604800000

# Path
server.servlet.context-path=/api

# Swagger
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/docs
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Nubefact
nubefact.api.url=${NUBEFACT_API_URL}
nubefact.api.token=${NUBEFACT_API_TOKEN}

#Factiliza
factiliza.api.url=${FACTILIZA_API_URL}
factiliza.api.token=${FACTILIZA_API_TOKEN}

# Culqi
app.culqi.public-key=${CULQI_PUBLIC_KEY}
app.culqi.secret-key=${CULQI_SECRET_KEY}
app.culqi.should-encrypt-payload=0
app.culqi.rsa-public-key=${CULQI_RSA_PUBLIC_KEY}
app.culqi.rsa-id=${CULQI_RSA_ID}

# Aws
cloud.aws.credentials.s3.access-key=${AWS_ACCESS_KEY:}
cloud.aws.credentials.s3.secret-key=${AWS_SECRET_KEY:}
cloud.aws.region.static=${AWS_REGION}
cloud.aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}

# Files config
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-request-size=10MB
spring.destination.folder="src/main/resources/static/"

# HikariCP
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
